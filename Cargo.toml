[package]
name = "rosemary"
version = "0.2.0"
edition = "2024"

[dependencies]
# Core
anyhow = "1"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
async-trait = "0.1"

# CLI & KB
clap = { version = "4.5", features = ["derive"] }
slug = "0.1"
dotenvy = "0.15"
serde_yaml = "0.9"
reqwest = { version = "0.12", features = ["json"] }
walkdir = "2"

# Chunking
text-splitter = { version = "0.29", features = ["tiktoken-rs"] }

# Embedding
fastembed = "5"

# Vector store
lancedb = "0.26"
arrow-array = "57"
arrow-schema = "57"
futures = "0.3"

# Database (metadata + FTS5 + graph)
libsql = "0.6"
tiktoken-rs = "0.9.1"
ratatui = "0.30.0"
crossterm = "0.29.0"

[dev-dependencies]
tempfile = "3"
tokio-test = "0.4"
filetime = "0.2"
