[package]
name = "rosemary"
version = "0.1.0"
edition = "2024"

[dependencies]
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
metrics = "0.23"
metrics-exporter-prometheus = "0.15"
tokio-util = { version = "0.7", features = ["full"] }
anyhow = "1"
thiserror = "2"

bytes = "1"

serde = { version = "1", features = ["derive"] }
serde_json = "1"

futures = "0.3"
tokio = { version = "1", features = ["full"] }
futures-util = "0.3"

reqwest = { version = "0.12", features = ["json"] }

tonic = "0.12"
prost = "0.13"

## async queue
# async runtime 
async-task = "4.7"
# lightweight implementation of futures
futures-lite = "2.6"
# MPMC channel
flume = "0.11"

[build-dependencies]
tonic-build = "0.12"
