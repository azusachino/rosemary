[package]
name = "rosemary"
version = "0.1.0"
edition = "2024"

[dependencies]
# Core
anyhow = "1"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }

# CLI & KB
clap = { version = "4.5", features = ["derive"] }
slug = "0.1"

# Databases
libsql = "0.6"
lancedb = "0.14"
